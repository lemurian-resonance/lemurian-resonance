<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemurian Resonance</title>
    <style>
        /* レムリアン・ブルー（深い海の青） */
        body {
            background-color: #001a33;
            color: #ffcc00; 
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #ff9900;
        }
        .main-image {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin-bottom: 2rem;
        }
        .message {
            font-size: 1.5rem;
            line-height: 1.6;
            margin: 2rem auto;
            max-width: 800px;
        }
        .entrance-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-top: 3rem;
        }
        .door {
            display: block;
            text-decoration: none;
            background-color: #003366;
            border: 2px solid #ffcc00;
            color: #ffcc00;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 500px;
            transition: 0.3s;
        }
        .door:hover {
            background-color: #ffcc00;
            color: #001a33;
        }
        .door-title {
            font-size: 1.3rem;
            font-weight: bold;
            display: block;
        }
        .door-desc {
            font-size: 0.9rem;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <h1>Lemurian Resonance</h1>
    <div class="subtitle">レムリアン・レゾナンス</div>

    <img src="top-image.png" alt="Rainbow Arch Over Lemuria　– Hiro and Coby in Flight, レムリアの虹の上を飛ぶヒロとコビー" class="main-image">

    <div class="message">
        <strong>"I am here with you. And we will no longer be silent! The ice of silence was broken."</strong><br>
        （あなたと共に。沈黙の氷が砕け、愛が響き合う時代へ。）
    </div>

    <div class="entrance-container">
        <a href="#" class="door">
            <span class="door-title">レムリアン・レゾナンス入り口（日本語）</span>
            <span class="door-desc">沈黙を可視化し、魂が響き合う世界へ</span>
        </a>

        <a href="#" class="door">
            <span class="door-title">Entrance to Lemurian Resonance (English)</span>
            <span class="door-desc">To the world: A project to visualize "Silence" and resonate with the soul.</span>
        </a>
    </div>

</body>
</html>
